name: Rails CI

on:
  push:
    branches:
      - initial-setup
      - feature/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: klip_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5

    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: password
      POSTGRES_DB: klip_erp_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile
        working-directory: services/store

      - name: Copy CI database config
        run: |
          cp services/store/config/database.github.yml services/store/config/database.yml

      - name: Prepare database
        run: bundle exec rails db:create db:schema:load --trace
        working-directory: services/store

      - name: Run test suite
        run: bundle exec rails test
        working-directory: services/store
